services:

  app:
    build: .
    container_name: ingressos_app

    ports:
      - "3000:3000"

    depends_on:
      - banco

    env_file:
      - .env

    restart: always

  banco:
    image: postgres:16
    container_name: ingressos_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingressos

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: